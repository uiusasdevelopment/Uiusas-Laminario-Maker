<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uiusas Laminario Maker</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Orbitron:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Metal+Mania&family=Special+Elite&family=Oswald:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Cropper.js CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body data-theme="moderno">

    <div class="app-container">
        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="mobile-menu-btn" onclick="document.body.classList.toggle('sidebar-open')">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Sidebar / Toolbar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-microscope" style="font-size: 1.8rem;"></i>
                <h2>Uiusas Laminario<span> Maker</span></h2>
            </div>

            <div class="control-group">
                <h3><i class="fas fa-palette"></i> Design & Tema</h3>
                <select id="theme-selector">
                    <option value="caderno">Caderno Histológico</option>
                    <option value="moderno">Moderno</option>
                    <option value="belle-epoque">Belle Époque</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="minimalista">Minimalista</option>
                    <optgroup label="Acadêmicos / Médicos">
                        <option value="vintage-med">Prontuário Clínico Vintage</option>
                        <option value="netter">Atlas Clássico (Netter)</option>
                        <option value="hitech">Laboratório Hi-Tech</option>
                    </optgroup>
                    <optgroup label="Inspirados em Jogos">
                        <option value="resident-evil">Resident Evil (Requiem)</option>
                        <option value="clair-obscur">Clair Obscur (Exp 33)</option>
                        <option value="pokemon">Jogos: Pokémon ZA</option>
                        <option value="pokemon-sword">Jogos: Pokémon Sword</option>
                        <option value="silksong">Hollow Knight: Silksong</option>
                        <option value="pipboy">Pip-Boy (Fallout)</option>
                        <option value="bloodborne">Gothic / Bloodborne</option>
                        <option value="tlou">The Last of Us / Cordyceps</option>
                        <option value="genshin">Genshin Impact</option>
                    </optgroup>
                    <optgroup label="RPG de Mesa / Fantasia">
                        <option value="hexatombe">Ordem Paranormal: Hexatombe</option>
                        <option value="sinais">Sinais do Outro Lado</option>
                        <option value="grimorio">Grimório de Alquimia</option>
                        <option value="taverna">Taverna Medieval</option>
                    </optgroup>
                    <optgroup label="Estéticas Artísticas">
                        <option value="vaporwave">Vaporwave / Synthwave</option>
                        <option value="steampunk">Steampunk</option>
                    </optgroup>
                </select>

                <div style="margin-top: 15px; margin-bottom: 15px;">
                    <label
                        style="font-size: 0.8rem; color: var(--ui-text-muted); display: flex; flex-direction: column; gap: 5px;">
                        Modificar Formato das Imagens (Opcional)
                        <select id="shape-selector" style="font-size: 0.9rem; padding: 8px;">
                            <option value="default">— Padrão do Tema —</option>
                            <option value="circle">Círculo Perfeito</option>
                            <option value="square">Quadrado</option>
                            <option value="rounded">Quadrado Arredondado</option>
                            <option value="diamond">Diamante / Losango</option>
                            <option value="hexagon">Hexágono</option>
                            <option value="pentagon">Pentágono Inclinado</option>
                            <option value="slanted">Paralelogramo Inclinado</option>
                        </select>
                    </label>
                </div>

                <div class="color-pickers"
                    style="margin-top: 5px; display: grid; grid-template-columns: auto auto; gap: 10px;">
                    <label
                        style="font-size: 0.8rem; color: var(--ui-text-muted); display: flex; flex-direction: column; gap: 5px;">
                        Cor Fundo Plana
                        <input type="color" id="bg-color-picker" value="#ffffff"
                            style="width: 100%; height: 35px; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
                    </label>
                    <label
                        style="font-size: 0.8rem; color: var(--ui-text-muted); display: flex; flex-direction: column; gap: 5px;">
                        Cor Paineis/Cartões
                        <input type="color" id="panel-color-picker" value="#f0f0f0"
                            style="width: 100%; height: 35px; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
                    </label>
                    <label
                        style="font-size: 0.8rem; color: var(--ui-text-muted); display: flex; flex-direction: column; gap: 5px;">
                        Cor Destaque (Accent)
                        <input type="color" id="accent-color-picker" value="#3b82f6"
                            style="width: 100%; height: 35px; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
                    </label>
                    <label
                        style="font-size: 0.8rem; color: var(--ui-text-muted); display: flex; flex-direction: column; gap: 5px;">
                        Cor Títulos Maiores
                        <input type="color" id="title-color-picker" value="#111111"
                            style="width: 100%; height: 35px; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
                    </label>
                    <label
                        style="font-size: 0.8rem; color: var(--ui-text-muted); display: flex; flex-direction: column; gap: 5px;">
                        Cor Frames/Bordas
                        <input type="color" id="frame-color-picker" value="#00f0ff"
                            style="width: 100%; height: 35px; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
                    </label>
                    <label
                        style="font-size: 0.8rem; color: var(--ui-text-muted); display: flex; flex-direction: column; gap: 5px; grid-column: span 2;">
                        Cor Textos Gerais
                        <input type="color" id="text-color-picker" value="#333333"
                            style="width: 100%; height: 35px; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
                    </label>
                </div>

                <div style="margin-top: 15px;">
                    <label
                        style="font-size: 0.9rem; color: var(--ui-text); display: flex; justify-content: space-between; margin-bottom: 5px;">
                        Tamanho da Fonte <span id="font-size-val">16px</span>
                    </label>
                    <input type="range" id="font-size-slider" min="10" max="32" value="16" style="width: 100%;">
                </div>

                <div style="margin-top: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--ui-border);"></div>
            </div>

            <div class="control-group">
                <h3><i class="fas fa-plus-square"></i> Adicionar Página</h3>
                <div class="page-types">
                    <button onclick="app.addPage('capa')"><i class="fas fa-book"></i> Capa</button>
                    <button onclick="app.addPage('sumario')"><i class="fas fa-list"></i> Sumário</button>
                    <button onclick="app.addPage('lamina-1img')"><i class="fas fa-image"></i> 1 Lâmina</button>
                    <button onclick="app.addPage('lamina-2img')"><i class="fas fa-images"></i> 2 Lâminas</button>
                    <button onclick="app.addPage('lamina-3img')"><i class="fas fa-th-large"></i> 3 Lâminas</button>
                    <button onclick="app.addPage('lamina-4img')"><i class="fas fa-th"></i> 4 Lâminas</button>
                </div>
            </div>

            <div class="control-group" style="flex-grow: 1; display: flex; flex-direction: column;">
                <h3><i class="fas fa-layer-group"></i> Navegar Páginas</h3>
                <ul id="pages-list" class="pages-list">
                    <!-- Sortable list of pages -->
                </ul>
            </div>

            <div class="sidebar-footer">
                <button class="export-btn" onclick="app.exportPDF()">
                    <i class="fas fa-file-pdf"></i> Exportar PDF
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <div class="workspace-header">
                <div class="zoom-controls">
                    <button onclick="app.zoom(-0.1)" title="Diminuir Zoom"><i class="fas fa-search-minus"></i></button>
                    <span id="zoom-level">100%</span>
                    <button onclick="app.zoom(0.1)" title="Aumentar Zoom"><i class="fas fa-search-plus"></i></button>
                </div>
                <div class="instruction">
                    <i class="fas fa-info-circle"></i> Clique em qualquer texto para editar e nas imagens circulares
                    para alterar a lâmina.
                </div>
            </div>

            <div class="preview-container">
                <div id="document-preview" class="document-preview">
                    <!-- Pages will be injected here -->
                </div>
            </div>
        </main>

        <!-- Image Cropper Modal -->
        <div id="cropper-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Ajustar Foco da Lâmina</h3>
                    <button class="close-btn" onclick="app.closeCropper()"><i class="fas fa-times"></i></button>
                </div>
                <div class="cropper-container">
                    <img id="cropper-image" src="" alt="Crop preview">
                </div>
                <div class="modal-actions">
                    <button class="btn secondary" onclick="app.closeCropper()">Cancelar</button>
                    <button class="btn primary" onclick="app.applyCrop()"><i class="fas fa-check"></i> Aplicar
                        Recorte</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
